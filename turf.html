<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SideKick – Find Turfs</title>

<style>
body{
    font-family:'Segoe UI',Arial,sans-serif;
    background:#eef2f7;
    margin:0;
}

/* ===== HEADER ===== */
.header{
    background:#0d47a1;
    color:white;
    padding:25px 15px;
    text-align:center;
}

.header h1{
    margin:0;
    font-size:42px;
}

.header p{
    margin-top:8px;
    font-size:18px;
}

/* ===== TURF GRID ===== */
.grid{
    max-width:1000px;
    margin:30px auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:20px;
    padding:10px;
}

.turf-card{
    background:white;
    padding:20px;
    border-radius:16px;
    box-shadow:0 6px 20px rgba(0,0,0,0.08);
    transition:0.2s;
}

.turf-card:hover{
    transform:translateY(-4px);
    box-shadow:0 10px 30px rgba(0,0,0,0.12);
}

.turf-card h3{
    margin:5px 0;
    color:#0d47a1;
}

.btn{
    display:inline-block;
    margin-top:10px;
    padding:10px 18px;
    border-radius:8px;
    background:#25D366;
    color:white;
    text-decoration:none;
    font-weight:500;
}

.btn:hover{
    background:#1ebe5d;
}

/* ===== FOOTER ===== */
.footer{
    text-align:center;
    margin-top:30px;
    padding:20px;
    color:#666;
    font-size:14px;
}
</style>
</head>

<body>

<div class="header">
    <h1>SideKick</h1>
    <p>Find teammates. Book turfs. Play more.</p>
</div>

<div class="grid">

    <div class="turf-card">
        <h3>Gologol Sports Hub</h3>
        <p>📍 Koratty</p>
        <a href="gologol.html" class="btn">Check Slots</a>
    </div>

    <!-- Future turfs -->
    <!--
    <div class="turf-card">
        <h3>ABC Turf</h3>
        <p>📍 Kochi</p>
        <a href="#" class="btn">Coming Soon</a>
    </div>
    -->

</div>

<div class="footer">
    © 2026 SideKick • Built with ❤️ for local sports communities
</div>

</body>
</html>
